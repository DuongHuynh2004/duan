<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung tâm hỗ trợ tư vấn sức khỏe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: red;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        .menu {
            display: flex;
            justify-content: center;
            background-color: white;
            padding: 10px 0;
        }
        .menu a {
            color: black;
            text-decoration: none;
            padding: 10px 15px;
            font-size: 16px;
        }
        .menu a:hover {
            text-decoration: underline;
        }
        .search-container {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        .search-box {
            width: 50%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="header">Trung tâm hỗ trợ tư vấn sức khỏe trực tuyến</div>
    <div class="menu">
        <a href="#">Trang chủ</a>
        <a href="#">Giới thiệu</a>
        <a href="#">Chuyên khoa</a>
        <a href="#">Chuyên gia</a>
        <a href="#">Hướng dẫn</a>
        <a href="#">Dịch vụ</a>
        <a href="#">Tin tức</a>
        <a href="#">Liên hệ</a>
    </div>
    <div class="search-container">
        <input type="text" class="search-box" placeholder="Tìm kiếm...">
    </div>
</body>
</html>
